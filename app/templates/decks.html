{% extends "base.html" %}

{% block content %}
  <h2>Decks</h2>
  <ul>
    {% for deck in decks %}
      <li>
        <strong>{{ deck.name }}</strong>
        {% if deck.description %}
          - {{ deck.description }}
        {% endif %}
        <a href="/decks/{{ deck.id }}">View deck</a>
        <a href="/decks/{{ deck.id }}/edit">Edit</a>
        <form method="post" action="/decks/{{ deck.id }}/delete">
          <button type="submit">Delete deck</button>
        </form>
      </li>
    {% endfor %}
  </ul>

  <h2>Create a Deck</h2>
  <form method="post" action="/decks">
    <label for="name">Deck Name</label>
    <input id="name" name="name" type="text" />
    <label for="description">Description</label>
    <input id="description" name="description" type="text" />

    <button type="submit">Create deck</button>
  </form>
{% endblock %}
