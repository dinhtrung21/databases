<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Study Tracker</title>
  </head>
  <body>
    <h1>Study Tracker</h1>
    <h2>Decks</h2>

    <ul>
      {% for deck in decks %}
        <li>
          <strong>{{ deck.name }}</strong>
          {% if deck.description %}
            - {{ deck.description }}
          {% endif %}
        </li>
      {% endfor %}
    </ul>
  </body>
</html>
