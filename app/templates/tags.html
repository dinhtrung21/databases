<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Study Tracker</title>
  </head>
  <body>
    <h1>Study Tracker</h1>
    <h2>Tags</h2>

    <ul>
      {% for tag in tags %}
        <li>{{ tag.name }}</li>
      {% endfor %}
    </ul>

    <h2>Create a Tag</h2>
    <form method="post" action="/tags">
      <label for="name">Tag Name</label>
      <input id="name" name="name" type="text" />

      <button type="submit">Create</button>
    </form>
  </body>
</html>
